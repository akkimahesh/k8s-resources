apiVersion: v1
kind: Pod
metadata:
  name: resources
  namespace: roboshop
spec:
  containers:
  - name: nginx
    image: nginx
    ports:
    - containerPort: 80  #only for documentation purpose like EXPOSE 80 in Dockerfile
    resources:
      requests:
        memory: "50Mi"
        cpu: "150m"
      limits:
        memory: "100Mi"
        cpu: "250m"