apiVersion: v1
kind: Pod
metadata:
  name: environment
  namespace: roboshop
spec:
  containers:
  - name: nginx
    image: nginx
    ports:
    - containerPort: 80  #only for documentation purpose like EXPOSE 80 in Dockerfile
    environment:
      - name: ENVIRONMENT
        value: dev  
      - name : Project
        value: roboshop