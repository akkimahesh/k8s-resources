apiVersion: v1
kind: Service
metadata:
  name: access-deploymentpods
  namespace: roboshop
spec:
  type: NodePort
  selector:
    project: roboshop-demo
    infrastructure: eks
    environment: dev
    tier: frontend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 3000
      nodePort: 30080